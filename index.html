<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Quest — Gamified Java Prep for Pratiksha</title>
  <!-- SEO Tags -->
  <meta name="description" content="Crack your next client interview with our interactive, gamified Java developer prep app. Track progress, review cards, and take mock challenges.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- App Container Shell -->
  <div class="app-shell">
    
    <!-- Top Premium Navigation Bar -->
    <header class="app-header glass-card">
      <div class="header-left" onclick="window.Router.navigate('dashboard')">
        <span class="app-logo">🎮</span>
        <h2>Interview Quest</h2>
      </div>
      
      <nav class="header-nav">
        <button class="nav-link active" onclick="window.Router.navigate('dashboard')">🏠 Dashboard</button>
        <button class="nav-link" onclick="window.Router.navigate('skillmap')">🗺️ Skill Map</button>
        <button class="nav-link" onclick="window.Router.navigate('progress')">📊 My Progress</button>
      </nav>

      <div class="header-right">
        <!-- Live Profile Status -->
        <div class="header-profile glass-card" id="profile-summary-header" onclick="window.Router.navigate('progress')">
          <!-- Dynamically populated -->
        </div>
      </div>
    </header>

    <!-- Main Content Container -->
    <main class="app-main">
      <div id="app-container" class="fade-in">
        <!-- Dynamically rendered by router -->
      </div>
    </main>
  </div>

  <!-- Float notification stack for XP rewards -->
  <div id="notification-container" class="notification-container"></div>

  <!-- Gamification Level Up & Badge unlock modals -->
  <div id="gamification-modal" class="modal-overlay"></div>

  <!-- 1. Content Data Modules -->
  <script src="js/data/java-core.js"></script>
  <script src="js/data/java-modern.js"></script>
  <script src="js/data/best-practices.js"></script>
  <script src="js/data/testing.js"></script>
  <script src="js/data/spring.js"></script>
  <script src="js/data/architecture.js"></script>
  <script src="js/data/problems.js"></script>
  <script src="js/data/cloud-ai.js"></script>

  <!-- 2. Core Logic Systems -->
  <script src="js/storage.js"></script>
  <script src="js/gamification.js"></script>
  
  <!-- 3. Page Rendering Modules -->
  <script src="js/dashboard.js"></script>
  <script src="js/skillmap.js"></script>
  <script src="js/notes.js"></script>
  <script src="js/flashcards.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/interview.js"></script>
  <script src="js/progress.js"></script>

  <!-- 4. Orchestration Router (Loads last) -->
  <script src="js/app.js"></script>

</body>
</html>
